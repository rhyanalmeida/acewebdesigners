    <!-- Preload Critical Resources
         Was preloading Inter + Outfit. Outfit was referenced nowhere in the CSS
         or Tailwind config, so it was a blocking request for a font that never
         rendered; Fraunces — the display face the whole design depends on — was
         NOT preloaded and arrived late via a render-blocking @import, which put
         a serif→Fraunces reflow on every heading at first paint. Now preloads
         exactly the three faces the site actually uses. -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300..900&family=IBM+Plex+Mono:wght@400;500&display=swap"
      as="style"
      onload="
        this.onload = null
        this.rel = 'stylesheet'
      "
    />

        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300..900&family=IBM+Plex+Mono:wght@400;500&display=swap"

    <!-- Meta Pixel Code -->
    <!-- The main-site pixel is skipped on /contractorlanding AND /buildyoursite —
         those pages each load their OWN pixel (contractor in LandingContractors.tsx,
         restaurant in BuildYourSite.tsx) so we don't double-fire events to two
         pixels on the same page. Each ad funnel is fully isolated to one pixel. -->
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return
        n = f.fbq = function () {
          n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments)
        }
        if (!f._fbq) f._fbq = n
        n.push = n
        n.loaded = !0
        n.version = '2.0'
        n.queue = []
        t = b.createElement(e)
        t.async = !0
        t.src = v
        s = b.getElementsByTagName(e)[0]
        s.parentNode.insertBefore(t, s)
      })(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js')
      if (!/\/(contractorlanding|buildyoursite)(\/|$|\?)/i.test(window.location.pathname + window.location.search)) {
        fbq('init', '1703925480259996')
        fbq('track', 'PageView')
      }
    </script>
    <!-- End Meta Pixel Code -->

    <!-- Booking runs through our own Supabase scheduler (src/components/scheduler).
