<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    /* Base artwork is a BLACK "A" on transparent. On dark browser chrome we
       invert it to white. Covers both directions inside a single file. */
    #m { }
    @media (prefers-color-scheme: dark) { #m { filter: invert(1); } }
  </style>
  <image id="m" width="128" height="128" href="data:image/png;base64,"/>
</svg>
