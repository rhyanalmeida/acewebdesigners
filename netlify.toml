[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback. No Netlify Functions — booking, lead storage, and the Meta
# Conversions API all run in Supabase Edge Functions (see supabase/functions).
# This also serves the client-side /admin route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
