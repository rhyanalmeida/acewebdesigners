[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # @netlify/blobs MUST stay external — bundling it breaks the runtime
  # auto-injection of siteID/token. (Without this, getStore() throws
  # "The environment has not been configured to use Netlify Blobs".)
  external_node_modules = ["@netlify/blobs"]

# SPA fallback — must come AFTER any function redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
